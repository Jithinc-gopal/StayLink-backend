services:

  postgres:
    image: postgres:16
    container_name: staylink_postgres
    environment:
      POSTGRES_DB: StayLinkDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - staylink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: staylink_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./staylinkproject
    container_name: staylink_django
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 staylinkproject.asgi:application"
    volumes:
      - ./staylinkproject:/app
      - staylink_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./staylinkproject/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./staylinkproject
    container_name: staylink_celery
    command: >
      sh -c "python wait_for_db.py &&
             celery -A staylinkproject worker --pool=solo --loglevel=info -Q email_queue"
    volumes:
      - ./staylinkproject:/app
    env_file:
      - ./staylinkproject/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./staylinkproject
    container_name: staylink_celery_beat
    command: >
      sh -c "python wait_for_db.py &&
             celery -A staylinkproject beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - ./staylinkproject:/app
    env_file:
      - ./staylinkproject/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_service:
    build:
      context: ./ai_service
    container_name: staylink_ai
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai_service:/app
    ports:
      - "8001:8001"
    env_file:
      - ./ai_service/.env
    depends_on:
      - django

volumes:
  staylink_postgres_data:
  staylink_media:
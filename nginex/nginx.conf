events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Maximum upload size — covers ID proofs and property images
    client_max_body_size 20M;

    # Django container
    upstream django {
        server django:8000;
    }

    # FastAPI AI service container
    upstream ai_service {
        server ai_service:8001;
    }

    server {
        listen 80;
        server_name _;

        # ── Static files ──────────────────────────────────────────
        # Served directly by Nginx — never touches Django
        # CSS, JS, Django admin files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Media files ───────────────────────────────────────────
        # Served directly by Nginx — never touches Django
        # Property images, profile photos, ID proof documents
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # ── AI service ────────────────────────────────────────────
        # Forwards to FastAPI container
        # Long timeout because LLM responses can be slow
        location /api/ai/ {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── WebSocket connections ─────────────────────────────────
        # Handles /ws/chat/ and /ws/notifications/
        # Requires special upgrade headers for WebSocket protocol
        # 86400s = 24 hours — keeps chat connections alive
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ── Django API ────────────────────────────────────────────
        # All other requests go to Django
        # X-Forwarded-For passes real user IP to Django
        # X-Forwarded-Proto tells Django if request was HTTP or HTTPS
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
services:

  postgres:
    image: postgres:16
    container_name: staylink_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - staylink_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: staylink_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./staylinkproject
    container_name: staylink_django
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 staylinkproject.asgi:application"
    volumes:
      - staylink_media:/app/media
      - staylink_static:/app/staticfiles
    expose:
      - "8000"
    env_file:
      - ./staylinkproject/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery:
    build:
      context: ./staylinkproject
    container_name: staylink_celery
    command: >
      sh -c "python wait_for_db.py &&
             celery -A staylinkproject worker --pool=solo --loglevel=info -Q email_queue"
    volumes:
      - staylink_media:/app/media
    env_file:
      - ./staylinkproject/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_beat:
    build:
      context: ./staylinkproject
    container_name: staylink_celery_beat
    command: >
      sh -c "python wait_for_db.py &&
             celery -A staylinkproject beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    env_file:
      - ./staylinkproject/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  ai_service:
    build:
      context: ./ai_service
    container_name: staylink_ai
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    expose:
      - "8001"
    env_file:
      - ./ai_service/.env.prod
    depends_on:
      - django
    restart: always

  nginx:
    image: nginx:alpine
    container_name: staylink_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - staylink_media:/app/media:ro
      - staylink_static:/app/staticfiles:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - django
    restart: always

volumes:
  staylink_postgres_data:
  staylink_media:
  staylink_static: